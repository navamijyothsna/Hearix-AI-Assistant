<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearix AI Voice Assistant</title>
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00e676;
            --error-color: #ff5252;
            --table-border: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        .page {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 20px;
        }

        /* --- USER PAGE --- */
        #user-page {
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .admin-link-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #333;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: var(--secondary-bg);
            border: 4px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        #ai-response-container {
            margin-top: 30px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 12px;
            max-width: 700px;
            width: 90%;
            text-align: left;
            border-left: 5px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- ADMIN STYLES --- */
        .admin-container {
            max-width: 850px;
            margin: 40px auto;
            background: var(--secondary-bg);
            padding: 30px;
            border-radius: 12px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .primary-btn {
            background: var(--accent-color);
            color: black;
            font-weight: bold;
            padding: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #444;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="user-page" class="page" onclick="toggleVoice()" tabindex="0" onkeydown="handleKeyPress(event)">
        <button class="admin-link-btn" onclick="event.stopPropagation(); navigateTo('admin-auth-page')">Admin Portal</button>
        
        <div class="mic-container" style="text-align: center; width: 100%;">
            <div class="mic-btn" id="voice-icon">🎤</div>
            <p class="status-text" id="voice-status" style="font-size: 1.4rem; font-weight: bold; margin-top: 20px;">Tap to Speak</p>
            
            <center>
                <div id="ai-response-container" class="hidden">
                    <h4 style="margin: 0 0 10px 0; color: var(--accent-color);">Assistant Response:</h4>
                    <p id="ai-response-text" style="margin: 0; line-height: 1.6;"></p>
                </div>
            </center>

            <p style="opacity: 0.5; margin-top: 20px;">Or press Spacebar</p>
        </div>
    </div>

    <div id="admin-auth-page" class="page hidden">
        <div class="admin-container" style="max-width: 400px;">
            <button onclick="navigateTo('user-page')" style="background:none; color:var(--accent-color); border:none; cursor:pointer; margin-bottom:10px;">← Back</button>
            <h2 id="auth-title">Admin Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div id="login-section">
                <button class="primary-btn" onclick="login()">Login</button>
                <p onclick="toggleAuthMode()" style="text-align:center; cursor:pointer; margin-top:15px; font-size:0.9rem;">New here? Register</p>
            </div>
            <div id="signup-section" class="hidden">
                <button class="primary-btn" onclick="signup()">Register</button>
                <p onclick="toggleAuthMode()" style="text-align:center; cursor:pointer; margin-top:15px; font-size:0.9rem;">Have an account? Login</p>
            </div>
        </div>
    </div>

    <div id="admin-dashboard-page" class="page hidden">
        <div class="admin-container">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Admin Dashboard</h2>
                <button onclick="logout()" style="background:var(--error-color); color:white; border:none; padding:8px 15px; border-radius:5px;">Logout</button>
            </div>

            <div style="background:#2a2a2a; padding:20px; border-radius:10px; margin-top:20px;">
                <h3>Upload Document</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <select id="upload-dept"><option value="CS">CS</option><option value="EC">EC</option></select>
                    <input type="number" id="upload-sem" value="6" placeholder="Semester">
                    <select id="upload-category"><option value="note">Note</option><option value="syllabus">Syllabus</option></select>
                </div>
                <input type="text" id="upload-sub" placeholder="Subject Name (e.g. Python)">
                <input type="file" id="upload-file" accept=".pdf" style="margin-top:10px;">
                <button class="primary-btn" onclick="uploadFile()">Upload PDF</button>
            </div>

            <table id="files-table">
                <thead><tr><th>Subject</th><th>Type</th><th>Dept</th><th>Sem</th><th>Action</th></tr></thead>
                <tbody id="files-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR RENDER URL
        const API_BASE_URL = "https://hearix-backend.onrender.com"; 
        let authToken = localStorage.getItem("token");

        function navigateTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'admin-dashboard-page') fetchFiles();
        }

        function toggleAuthMode() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('signup-section').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = document.getElementById('login-section').classList.contains('hidden') ? "Register" : "Login";
        }

        async function signup() {
            const res = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('username').value, password: document.getElementById('password').value, role: "admin"})
            });
            if(res.ok) { alert("Registered!"); toggleAuthMode(); }
        }

        async function login() {
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            const res = await fetch(`${API_BASE_URL}/auth/login`, { method: 'POST', body: formData });
            if(res.ok) {
                const data = await res.json();
                authToken = data.access_token;
                localStorage.setItem("token", authToken);
                navigateTo('admin-dashboard-page');
            } else { alert("Invalid Credentials"); }
        }

        function logout() { localStorage.removeItem("token"); navigateTo('user-page'); }

        async function uploadFile() {
            const formData = new FormData();
            formData.append('dept', document.getElementById('upload-dept').value);
            formData.append('sem', document.getElementById('upload-sem').value);
            formData.append('sub', document.getElementById('upload-sub').value);
            formData.append('category', document.getElementById('upload-category').value);
            formData.append('module', 1);
            formData.append('file', document.getElementById('upload-file').files[0]);

            const res = await fetch(`${API_BASE_URL}/files/upload`, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${authToken}`},
                body: formData
            });
            if(res.ok) { alert("Uploaded!"); fetchFiles(); }
        }

        async function fetchFiles() {
            const res = await fetch(`${API_BASE_URL}/files/search?dept=CS&semester=6`, {
                headers: {'Authorization': `Bearer ${authToken}`}
            });
            if(res.ok) {
                const files = await res.json();
                const body = document.getElementById('files-body');
                body.innerHTML = files.map(f => `<tr><td>${f.subject}</td><td>${f.category}</td><td>${f.dept}</td><td>${f.semester}</td><td><button onclick="deleteFile(${f.id})">Delete</button></td></tr>`).join('');
            }
        }

        // --- VOICE LOGIC ---
        let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = false;
        let isListening = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        function toggleVoice() {
            if (isListening) { recognition.stop(); return; }
            isListening = true;
            document.getElementById('ai-response-container').classList.add('hidden');
            document.getElementById('voice-icon').style.backgroundColor = 'var(--error-color)';
            document.getElementById('voice-status').innerText = "Listening...";
            speak("Listening");
            recognition.start();
        }

        recognition.onresult = async (event) => {
            isListening = false;
            document.getElementById('voice-icon').style.backgroundColor = 'var(--secondary-bg)';
            let transcript = event.results[0][0].transcript.toLowerCase();
            document.getElementById('voice-status').innerText = `Searching: ${transcript}`;

            // CLEANING LOGIC
            let reqCategory = transcript.includes("syllabus") ? "syllabus" : "note";
            let sub = transcript.replace(/read/g, "").replace(/syllabus/g, "").replace(/notes/g, "").replace(/for/g, "").replace(/the/g, "").replace(/\bs\d\b/g, "").trim();

            const url = `${API_BASE_URL}/assistant/fetch-and-read?dept=CS&sem=6&sub=${encodeURIComponent(sub)}&category=${reqCategory}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('ai-response-container').classList.remove('hidden');
                    document.getElementById('ai-response-text').innerText = data.voice_response;
                    speak(data.voice_response);
                } else {
                    speak("Document not found.");
                }
            } catch (e) { speak("Server error."); }
        };

        recognition.onerror = () => { isListening = false; document.getElementById('voice-icon').style.backgroundColor = 'var(--secondary-bg)'; };

        function handleKeyPress(e) { if(e.code === 'Space') { e.preventDefault(); toggleVoice(); } }
    </script>
</body>
</html>
