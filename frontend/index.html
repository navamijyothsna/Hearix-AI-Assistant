<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearix AI Assistant | KTU Project</title>
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00e676;
            --error-color: #ff5252;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- USER PAGE --- */
        #user-page {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }

        .admin-link-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .mic-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: var(--secondary-bg);
            border: 5px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .mic-btn:active { transform: scale(0.9); }

        #ai-response-container {
            margin-top: 30px;
            padding: 25px;
            background: #252525;
            border-radius: 15px;
            max-width: 80%;
            width: 600px;
            text-align: left;
            border-left: 6px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- ADMIN PANEL --- */
        .admin-box {
            max-width: 600px;
            margin: 50px auto;
            background: var(--secondary-bg);
            padding: 30px;
            border-radius: 12px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="user-page" onclick="toggleVoice()" tabindex="0" onkeydown="handleKeyPress(event)">
        <button class="admin-link-btn" onclick="event.stopPropagation(); navigateTo('admin-auth')">Admin Portal</button>
        
        <div class="mic-btn" id="voice-icon">🎤</div>
        <h2 id="voice-status" style="margin-top: 25px;">Tap anywhere to speak</h2>
        <p style="opacity: 0.5;">(Speak clearly: "Read the notes for SD")</p>

        <div id="ai-response-container" class="hidden">
            <h4 style="margin: 0 0 10px 0; color: var(--accent-color); text-transform: uppercase; font-size: 0.8rem;">Assistant Output</h4>
            <p id="ai-response-text" style="margin: 0; font-size: 1.1rem; line-height: 1.6;"></p>
        </div>
    </div>

    <div id="admin-auth" class="hidden" style="padding:20px;">
        <div class="admin-box">
            <button onclick="navigateTo('user-page')" style="background:none; color:var(--accent-color); border:none; cursor:pointer;">← Back</button>
            <h2 id="auth-title">Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" id="auth-btn" onclick="handleAuth()">Login</button>
            <p onclick="toggleAuthMode()" style="text-align:center; cursor:pointer; margin-top:20px; font-size:0.9rem;">Switch Login/Register</p>
        </div>
    </div>

    <div id="admin-dash" class="hidden" style="padding:20px;">
        <div class="admin-box" style="max-width: 900px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Admin Dashboard</h2>
                <button onclick="logout()" style="background:var(--error-color); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
            </div>

            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:10px; margin-top:20px;">
                <h3>Upload New PDF</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <select id="up-dept"><option value="CS">CS (Computer Science)</option><option value="EC">EC</option></select>
                    <input type="number" id="up-sem" value="6">
                </div>
                <input type="text" id="up-sub" placeholder="Subject Name (e.g. SD)">
                <select id="up-cat"><option value="note">Study Note</option><option value="syllabus">Syllabus</option></select>
                <input type="file" id="up-file" accept=".pdf">
                <button class="btn" onclick="uploadFile()">Upload to Database</button>
            </div>

            <table id="files-table">
                <thead><tr><th>Subject</th><th>Type</th><th>Sem</th><th>Action</th></tr></thead>
                <tbody id="files-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://hearix-backend.onrender.com";
        let isLogin = true;

        function navigateTo(id) {
            document.querySelectorAll('body > div:not(script)').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'admin-dash') loadFiles();
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Login" : "Register";
            document.getElementById('auth-btn').innerText = isLogin ? "Login" : "Register";
        }

        async function handleAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const endpoint = isLogin ? 'auth/login' : 'auth/register';
            
            if(isLogin) {
                const fd = new FormData(); fd.append('username', u); fd.append('password', p);
                const res = await fetch(`${API_BASE_URL}/${endpoint}`, { method: 'POST', body: fd });
                if(res.ok) {
                    const d = await res.json();
                    localStorage.setItem('token', d.access_token);
                    navigateTo('admin-dash');
                } else { alert("Auth Failed"); }
            } else {
                const res = await fetch(`${API_BASE_URL}/${endpoint}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p, role: 'admin'})
                });
                if(res.ok) { alert("Registered!"); toggleAuthMode(); }
            }
        }

        function logout() { localStorage.removeItem('token'); navigateTo('user-page'); }

        async function uploadFile() {
            const fd = new FormData();
            fd.append('dept', document.getElementById('up-dept').value);
            fd.append('sem', document.getElementById('up-sem').value);
            fd.append('sub', document.getElementById('up-sub').value);
            fd.append('category', document.getElementById('up-cat').value);
            fd.append('module', 1);
            fd.append('file', document.getElementById('up-file').files[0]);

            const res = await fetch(`${API_BASE_URL}/files/upload`, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`},
                body: fd
            });
            if(res.ok) { alert("Upload Successful"); loadFiles(); }
        }

        async function loadFiles() {
            const res = await fetch(`${API_BASE_URL}/files/search?dept=CS&semester=6`, {
                headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
            });
            const d = await res.json();
            document.getElementById('files-list').innerHTML = d.map(f => `
                <tr><td>${f.subject}</td><td>${f.category}</td><td>S${f.semester}</td>
                <td><button onclick="deleteFile(${f.id})" style="background:red; color:white; border:none; padding:5px; cursor:pointer;">Del</button></td></tr>
            `).join('');
        }

        async function deleteFile(id) {
            await fetch(`${API_BASE_URL}/files/${id}`, {
                method: 'DELETE', headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
            });
            loadFiles();
        }

        // --- SPEECH & AI LOGIC ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        let isListening = false;

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            window.speechSynthesis.speak(u);
        }

        function toggleVoice() {
            if(isListening) return;
            isListening = true;
            document.getElementById('ai-response-container').classList.add('hidden');
            document.getElementById('voice-icon').style.backgroundColor = 'var(--error-color)';
            document.getElementById('voice-status').innerText = "Listening...";
            speak("How can I help you?");
            recognition.start();
        }

        recognition.onresult = async (e) => {
            isListening = false;
            document.getElementById('voice-icon').style.backgroundColor = 'var(--secondary-bg)';
            let transcript = e.results[0][0].transcript.toLowerCase();

            // ADVANCED CLEANING: Remove semester (S1-S8), "read", "notes", etc.
            let cat = transcript.includes("syllabus") ? "syllabus" : "note";
            let sub = transcript
                .replace(/read/g, "")
                .replace(/syllabus/g, "")
                .replace(/notes/g, "")
                .replace(/for/g, "")
                .replace(/the/g, "")
                .replace(/\bs[1-8]\b/g, "") // Removes s1, s2, s3... s8
                .replace(/semester/g, "")
                .trim();

            document.getElementById('voice-status').innerText = `Searching: "${sub}"`;

            const url = `${API_BASE_URL}/assistant/fetch-and-read?dept=CS&sem=6&sub=${encodeURIComponent(sub)}&category=${cat}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('ai-response-container').classList.remove('hidden');
                    document.getElementById('ai-response-text').innerText = data.voice_response;
                    speak(data.voice_response);
                    document.getElementById('voice-status').innerText = "Response found.";
                } else {
                    speak("I couldn't find those notes in the database.");
                    document.getElementById('voice-status').innerText = "Document not found.";
                }
            } catch (err) { speak("Connection error."); }
        };

        recognition.onerror = () => { isListening = false; document.getElementById('voice-icon').style.backgroundColor = 'var(--secondary-bg)'; };
        function handleKeyPress(e) { if(e.code === 'Space') { e.preventDefault(); toggleVoice(); } }
    </script>
</body>
</html>
