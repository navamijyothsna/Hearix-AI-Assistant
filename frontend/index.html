<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearix AI Assistant | KTU Project</title>
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00e676;
            --error-color: #ff5252;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- USER PAGE --- */
        #user-page {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }

        .admin-link-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 10;
        }

        .mic-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: var(--secondary-bg);
            border: 5px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .mic-btn:active { transform: scale(0.9); }

        #ai-response-container {
            margin-top: 30px;
            padding: 25px;
            background: #252525;
            border-radius: 15px;
            max-width: 80%;
            width: 600px;
            text-align: left;
            border-left: 6px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- ADMIN PANEL --- */
        .admin-box {
            max-width: 800px;
            margin: 50px auto;
            background: var(--secondary-bg);
            padding: 30px;
            border-radius: 12px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaaaaa;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .filter-bar input, .filter-bar select {
            margin: 0;
            padding: 10px;
        }

        .filter-bar .btn {
            margin: 0;
            padding: 10px 20px;
            width: auto;
        }

        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: var(--accent-color); }
    </style>
</head>
<body>

    <div id="user-page" onclick="toggleVoice()" tabindex="0" onkeydown="handleKeyPress(event)">
        <button class="admin-link-btn" onclick="event.stopPropagation(); navigateTo('admin-auth')">Admin Portal</button>
        
        <div class="mic-btn" id="voice-icon">🎤</div>
        <h2 id="voice-status" style="margin-top: 25px;">Tap anywhere to speak</h2>
        <p style="opacity: 0.5;">(Speak clearly: "Read the notes for DS")</p>

        <div id="ai-response-container" class="hidden">
            <h4 style="margin: 0 0 10px 0; color: var(--accent-color); text-transform: uppercase; font-size: 0.8rem;">Assistant Output</h4>
            <p id="ai-response-text" style="margin: 0; font-size: 1.1rem; line-height: 1.6;"></p>
        </div>
    </div>

    <div id="admin-auth" class="hidden" style="padding:20px;">
        <div class="admin-box" style="max-width: 400px;">
            <button onclick="navigateTo('user-page')" style="background:none; color:var(--accent-color); border:none; cursor:pointer;">← Back</button>
            <h2 id="auth-title">Login</h2>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <button class="btn" id="auth-btn" onclick="handleAuth()">Login</button>
            <p onclick="toggleAuthMode()" style="text-align:center; cursor:pointer; margin-top:20px; font-size:0.9rem; color:#aaa;">Switch Login/Register</p>
        </div>
    </div>

    <div id="admin-dash" class="hidden" style="padding:20px;">
        <div class="admin-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Admin Dashboard</h2>
                <button onclick="logout()" style="background:var(--error-color); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
            </div>

            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:10px; margin-top:20px;">
                <h3 style="margin-top: 0;">Upload New Document</h3>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div class="form-group">
                        <label>Department</label>
                        <select id="up-dept"><option value="CS">Computer Science (CS)</option><option value="EC">Electronics (EC)</option></select>
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <input type="number" id="up-sem" value="6" placeholder="e.g. 6">
                    </div>
                </div>

                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="up-sub" placeholder="e.g. ds or sd">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="up-cat"><option value="note">Study Note</option><option value="syllabus">Syllabus</option></select>
                </div>

                <div class="form-group">
                    <label>Upload PDF File</label>
                    <input type="file" id="up-file" accept=".pdf">
                </div>

                <button class="btn" onclick="uploadFile()">Upload to Database</button>
            </div>

            <h3 style="margin-top: 40px; margin-bottom: 0;">Uploaded Files</h3>
            
            <div class="filter-bar">
                <span style="font-weight: bold; color: #aaa; font-size: 0.9rem;">Filter:</span>
                <select id="filter-dept" style="width: auto;">
                    <option value="">Select Dept...</option>
                    <option value="CS">CS</option>
                    <option value="EC">EC</option>
                </select>
                <input type="number" id="filter-sem" placeholder="Sem (e.g. 6)" style="width: 120px;">
                <button class="btn" onclick="applyFilter()">Apply</button>
                <button class="btn" onclick="loadAllFiles()" style="background: #555; color: white;">Clear / Show All</button>
            </div>

            <table id="files-table">
                <thead><tr><th>Subject</th><th>Type</th><th>Dept</th><th>Sem</th><th>Action</th></tr></thead>
                <tbody id="files-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://hearix-backend.onrender.com";
        let isLogin = true;

        function navigateTo(id) {
            document.querySelectorAll('body > div:not(script)').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'admin-dash') loadAllFiles(); // Load ALL files by default
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Login" : "Register New Admin";
            document.getElementById('auth-btn').innerText = isLogin ? "Login" : "Register";
        }

        async function handleAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            if(!u || !p) { alert("Please enter username and password!"); return; }

            const endpoint = isLogin ? 'auth/login' : 'auth/register';
            const fd = new FormData(); 
            fd.append('username', u); 
            fd.append('password', p);
            
            try {
                const res = await fetch(`${API_BASE_URL}/${endpoint}`, { method: 'POST', body: fd });
                if(res.ok) {
                    if (isLogin) {
                        const d = await res.json();
                        localStorage.setItem('token', d.access_token);
                        navigateTo('admin-dash');
                    } else {
                        alert("Registered Successfully! Please switch to Login mode.");
                        toggleAuthMode();
                    }
                } else { 
                    const errorData = await res.json();
                    alert(`Authentication Failed: ${errorData.detail || 'Check credentials.'}`); 
                }
            } catch (err) { alert(`Server error during authentication: ${err.message}`); }
        }

        function logout() { localStorage.removeItem('token'); navigateTo('user-page'); }

        async function uploadFile() {
            const fd = new FormData();
            fd.append('dept', document.getElementById('up-dept').value);
            fd.append('sem', document.getElementById('up-sem').value);
            
            const subject = document.getElementById('up-sub').value;
            if(!subject) { alert("Please enter a Subject Name."); return; }
            fd.append('sub', subject);
            
            fd.append('category', document.getElementById('up-cat').value);
            
            const fileInput = document.getElementById('up-file');
            if (fileInput.files.length === 0) { alert("Please select a PDF file."); return; }
            fd.append('file', fileInput.files[0]);

            try {
                const res = await fetch(`${API_BASE_URL}/files/upload`, {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`},
                    body: fd
                });
                if(res.ok) { 
                    alert("✅ File Uploaded Successfully!"); 
                    document.getElementById('up-file').value = "";
                    document.getElementById('up-sub').value = "";
                    loadAllFiles(); // Show all files after upload so you can see it
                }
                else { 
                    const errData = await res.json();
                    alert(`❌ Upload Failed: ${errData.detail || res.statusText}`); 
                }
            } catch (err) { alert(`❌ Upload Error: Could not connect to the backend server.`); }
        }

        // --- NEW: Load ALL files by default ---
        async function loadAllFiles() {
            const token = localStorage.getItem('token');
            if(!token) return;

            // Clear the filter inputs visually
            document.getElementById('filter-dept').value = "";
            document.getElementById('filter-sem').value = "";

            try {
                const res = await fetch(`${API_BASE_URL}/files/all`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                renderTable(res);
            } catch (err) { handleErrorDisplay(err); }
        }

        // --- NEW: Apply specific filter ---
        async function applyFilter() {
            const token = localStorage.getItem('token');
            if(!token) return;

            const dept = document.getElementById('filter-dept').value;
            const sem = document.getElementById('filter-sem').value;

            if(!dept || !sem) {
                alert("Please select both a Department and a Semester to filter.");
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/files/search?dept=${dept}&semester=${sem}`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                renderTable(res);
            } catch (err) { handleErrorDisplay(err); }
        }

        // Helper function to draw the table
        async function renderTable(res) {
            const tableBody = document.getElementById('files-list');
            if(res.ok) {
                const d = await res.json();
                if(d.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#aaa;">No files found.</td></tr>`;
                    return;
                }
                tableBody.innerHTML = d.map(f => `
                    <tr>
                        <td><strong>${f.subject.toUpperCase()}</strong></td>
                        <td>${f.category.toUpperCase()}</td>
                        <td>${f.dept}</td>
                        <td>S${f.semester}</td>
                        <td><button onclick="deleteFile(${f.id})" style="background:var(--error-color); color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer;">Delete</button></td>
                    </tr>
                `).join('');
            } else {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Error loading files from server.</td></tr>`;
            }
        }

        function handleErrorDisplay(err) {
            console.error("Could not load files", err); 
            document.getElementById('files-list').innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Connection error. Is the server running?</td></tr>`;
        }

        async function deleteFile(id) {
            if(confirm("Are you sure you want to delete this file?")) {
                try {
                    const res = await fetch(`${API_BASE_URL}/files/${id}`, {
                        method: 'DELETE', headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
                    });
                    if(res.ok) { loadAllFiles(); }
                    else { alert("Failed to delete file."); }
                } catch(err) { alert("Error deleting file."); }
            }
        }

        // --- SPEECH & AI LOGIC ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        let isListening = false;

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            window.speechSynthesis.speak(u);
        }

        function toggleVoice() {
            if(isListening) { recognition.stop(); return; }
            isListening = true;
            document.getElementById('ai-response-container').classList.add('hidden');
            document.getElementById('voice-icon').style.backgroundColor = 'var(--error-color)';
            document.getElementById('voice-status').innerText = "Listening...";
            speak("I am listening.");
            recognition.start();
        }

        recognition.onresult = async (e) => {
            isListening = false;
            document.getElementById('voice-icon').style.backgroundColor = 'var(--secondary-bg)';
            let transcript = e.results[0][0].transcript.toLowerCase();

            let cat = transcript.includes("syllabus") ? "syllabus" : "note";
            let sub = transcript
                .replace(/read/g, "").replace(/syllabus/g, "").replace(/notes/g, "")
                .replace(/for/g, "").replace(/the/g, "").replace(/\bs[1-8]\b/g, "")
                .replace(/semester/g, "").trim();

            document.getElementById('voice-status').innerText = `Searching: "${sub}"`;

            const url = `${API_BASE_URL}/assistant/fetch-and-read?dept=CS&sem=6&sub=${encodeURIComponent(sub)}&category=${cat}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('ai-response-container').classList.remove('hidden');
                    document.getElementById('ai-response-text').innerText = data.voice_response;
                    speak(data.voice_response);
                    document.getElementById('voice-status').innerText = "Response found.";
                } else {
                    speak("I couldn't find those notes.");
                    document.getElementById('voice-status').innerText = "Document not found.";
                }
            } catch (err) { 
                speak("Connection error."); 
                document.getElementById('voice-status').innerText = "Error connecting to backend server."; 
            }
        };

        recognition.onerror = () => { 
            isListening = false; 
            document.getElementById('voice-icon').style.backgroundColor = 'var(--secondary-bg)'; 
            document.getElementById('voice-status').innerText = "Tap to Speak";
        };
        
        function handleKeyPress(e) { if(e.code === 'Space') { e.preventDefault(); toggleVoice(); } }
    </script>
</body>
</html>
